services:
  admin-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENTRY_POINT: lib/admin_web_main.dart
    container_name: ateker_admin_web
    ports:
      - "8080:80"
    restart: unless-stopped

  mobile-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENTRY_POINT: lib/main.dart
    container_name: ateker_mobile_pwa
    ports:
      - "8081:80"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: ateker_minio
    ports:
      - "9900:9000"
      - "9901:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  minio_data:
